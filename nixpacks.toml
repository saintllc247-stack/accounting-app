[phases.setup]
nixPkgs = ["nodejs", "python311", "python311Packages.pip"]

[phases.install]
cmds = [
  "cd frontend && npm ci",
  "cd backend && python -m venv /opt/venv && . /opt/venv/bin/activate && pip install -r requirements.txt"
]

[phases.build]
cmds = [
  "cd frontend && npm run build",
  "rm -rf backend/static",
  "cp -r frontend/dist backend/static"
]

[start]
cmd = "cd backend && . /opt/venv/bin/activate && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
